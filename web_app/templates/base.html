<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if rtl else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ t('app_title') }}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css?v={{ app_version }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    {% block head %}{% endblock %}
    <style>
        :root {
            --primary: {{ branding.primary_color or '#27ae60' }};
            --secondary: {{ branding.secondary_color or '#1e8449' }};
            --accent: {{ branding.accent_color or '#3498db' }};
        }
    </style>
</head>
<body class="{{ 'dark' if request.cookies.get('theme') == 'dark' else 'light' }}">
    {% block body %}{% endblock %}
    <script src="/static/js/app.js?v={{ app_version }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
