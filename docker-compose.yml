version: "3.8"

services:
  lotus-web:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-latest}
    container_name: lotus-manager-web
    restart: unless-stopped
    ports:
      - "16320:16320"
    volumes:
      - lotus-data:/app/web_app/data
      - lotus-uploads:/app/web_app/static/uploads
    environment:
      - SECRET_KEY=${SECRET_KEY:-lotus-vps-secret-2026}
      - APP_VERSION=${APP_VERSION:-latest}

volumes:
  lotus-data:
  lotus-uploads:
